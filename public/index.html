<!DOCTYPE strict>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Quality PDF Compressor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF Compressor</h1>
            <p>Compress your PDFs and folders securely with no loss in visible quality.</p>
        </header>

        <main>
            <div class="upload-section" id="drop-area">
                <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 1rem;">
                    <!-- File upload -->
                    <input type="file" id="fileElem" multiple accept="application/pdf,image/jpeg,image/png,image/webp">
                    <label class="button" for="fileElem">Select Files</label>
                    
                    <!-- Folder upload -->
                    <input type="file" id="folderElem" multiple webkitdirectory directory accept="application/pdf,image/jpeg,image/png,image/webp">
                    <label class="button" for="folderElem">Select Folder</label>
                </div>
                <p>or drag and drop your folders/files here</p>
                <div id="file-list" class="file-list"></div>
            </div>

            <div class="options-section">
                <h3>Compression Quality</h3>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="quality" value="high" checked>
                        <div class="radio-content">
                            <span class="title">High Quality (Recommended)</span>
                            <span class="desc">Excellent size reduction, looks perfect on screen and print.</span>
                        </div>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="quality" value="maximum">
                        <div class="radio-content">
                            <span class="title">Maximum Quality</span>
                            <span class="desc">Keeps highest possible color details. Smaller size reduction.</span>
                        </div>
                    </label>
                    <label class="radio-label" style="border-color: #f59e0b;">
                        <input type="radio" name="quality" value="extreme">
                        <div class="radio-content">
                            <span class="title" style="color: #d97706;">Extreme Compression 🚀</span>
                            <span class="desc">Maximum file size reduction. Visible quality loss. Best for slow networks.</span>
                        </div>
                    </label>
                </div>
                
                <h3 style="margin-top: 1.5rem;">Advanced Features ✨</h3>
                <div class="advanced-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="convertToWebp" checked>
                        <div class="checkbox-content">
                            <span class="title">Convert to Next-Gen WebP</span>
                            <span class="desc">Futuristic format. Reduces image size up to 80% with no visible quality drop.</span>
                        </div>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="resizeLarge" checked>
                        <div class="checkbox-content">
                            <span class="title">Auto-Resize Huge Images</span>
                            <span class="desc">Smartly downscales images over 2000px wide to save massive amounts of space.</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="actions">
                <button id="compress-btn" class="primary-btn" disabled>Compress Files</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Compressing your files... Please wait.</p>
            </div>

            <div id="results-section" class="results-section hidden">
                <h3>Compression Complete! 🎉</h3>
                <div id="compression-stats" style="margin-bottom: 1.5rem; color: var(--text-main); font-size: 0.95rem;">
                    <!-- Stats will be populated here -->
                </div>
                <div class="result-actions">
                    <a id="download-link" href="#" class="primary-btn success">Download Compressed</a>
                    <a id="undo-link" href="#" class="secondary-btn">Undo & Download Originals</a>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/uuid@8.3.2/dist/umd/uuidv4.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
